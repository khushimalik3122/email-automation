name: Humanized Email Automation (IST)

on:
  schedule:
    - cron: '30 4,6,8,11 * * 1-5' 
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    # CRITICAL: Grants the runner permission to push files back
    permissions:
      contents: write

    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for successful pushing
          

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yagmail

      - name: Run script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python send_emails.py

      - name: Auto-commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update logs and sent contacts [skip ci]"
          file_pattern: 'sent_contacts.csv email_log.txt'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
