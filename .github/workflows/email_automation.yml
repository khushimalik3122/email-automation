name: Humanized Email Automation (IST)

on:
  schedule:
    - cron: '30 4,6,8,11 * * 1-5' 
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    # CRITICAL: Grants the runner permission to push files back
    permissions:
      contents: write

    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for successful pushing
          

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yagmail

      - name: Run script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python send_emails.py

      - name: Save updated contacts and logs back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_contacts.csv email_log.txt
          # Only commit if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update sent contacts and logs"
          git push
