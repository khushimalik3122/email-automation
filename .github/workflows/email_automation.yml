name: Daily Email Automation

on:
  schedule:
    # This runs the script every day at 10:00 AM UTC (adjust as needed)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the GitHub website

permissions:
  contents: write # Important: Gives the action permission to save files back to your repo

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run email script
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          NUM_EMAILS: 20
          DELAY_SECONDS: 30
        run: python send_emails.py

      - name: Save updated contacts and logs back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_contacts.csv email_log.txt
          # Only commit if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update sent contacts and logs"
          git push