name: Humanized Email Automation

on:
  schedule:
    - cron: '0 4,8,12 * * *' # 
  workflow_dispatch: #

jobs:
  build:
    runs-on: ubuntu-latest
    
    # --- CRITICAL FIX FOR 403 ERROR ---
    permissions:
      contents: write
    # ----------------------------------

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yagmail

      - name: Run script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_contacts.csv email_log.txt || echo "No changes to add"
          git commit -m "Update sent contacts [skip ci]" || echo "No changes to commit"
          git push origin main
