name: Smart Daily Email Automation

on:
  schedule:
    - cron: '0 3 * * 1-5'   # 8:30 AM IST (Mon–Fri)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Smart Email Automation
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python send_emails.py

      - name: Save updated contacts and logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_contacts.csv email_log.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update logs"
          git push



















