name: Daily Email Automation

on:
  schedule:
    # 1-5 ka matlab hai sirf Monday, Tuesday, Wednesday, Thursday aur Friday
    - cron: '0 3 * * 1-5'  # 8:30 AM IST (Mon-Fri)
    - cron: '0 5 * * 1-5'  # 10:30 AM IST (Mon-Fri)
    - cron: '0 7 * * 1-5'  # 12:30 PM IST (Mon-Fri)
    - cron: '0 9 * * 1-5'  # 2:30 PM IST (Mon-Fri)

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run email script
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          NUM_EMAILS: 50
          # Maine yahan sabke liye 3 second ka standard delay rakha hai taaki errors na aayein
          DELAY_SECONDS: 12 
        run: python send_emails.py

      - name: Save updated contacts and logs back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_contacts.csv email_log.txt
          # Only commit if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update sent contacts and logs"
          git push



























